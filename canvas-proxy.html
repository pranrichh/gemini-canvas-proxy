<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Gemini Canvas Proxy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080a0f;
            --surface: #0f1218;
            --surface-2: #161b24;
            --border: rgba(255, 255, 255, 0.06);
            --border-bright: rgba(255, 255, 255, 0.1);
            --text: #e8edf5;
            --text-secondary: #7a8599;
            --text-dim: #4a5568;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.12);
            --accent-soft: rgba(99, 102, 241, 0.08);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.15);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.12);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.12);
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 580px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* ── Header ───────────────────────────────────────────── */

        .header {
            margin-bottom: 28px;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .header p {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-left: 54px;
        }

        /* ── Status Bar ───────────────────────────────────────── */

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        .status-bar.online { border-color: rgba(16, 185, 129, 0.2); }
        .status-bar.offline { border-color: rgba(239, 68, 68, 0.2); }
        .status-bar.waiting { border-color: rgba(245, 158, 11, 0.2); }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--green);
            box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
        }

        .status-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }

        .status-dot.waiting {
            background: var(--yellow);
            box-shadow: 0 0 8px var(--yellow-glow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .status-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
        }

        .status-badge {
            margin-left: auto;
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.02em;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-badge.active {
            background: var(--green-glow);
            color: var(--green);
        }

        .status-badge.inactive {
            background: var(--red-glow);
            color: var(--red);
        }

        /* ── Stats ────────────────────────────────────────────── */

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .stat-value.default { color: var(--accent); }
        .stat-value.success { color: var(--green); }
        .stat-value.error { color: var(--red); }

        .stat-label {
            font-size: 0.62rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ── Log ──────────────────────────────────────────────── */

        .log-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
        }

        .log-header-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .log-header-count {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .log-container {
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .log-container::-webkit-scrollbar { width: 5px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 3px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.4;
            transition: background 0.15s;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .log-time {
            color: var(--text-dim);
            flex-shrink: 0;
            font-size: 0.62rem;
            min-width: 52px;
        }

        .log-indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .log-indicator.request { background: var(--accent); }
        .log-indicator.success { background: var(--green); }
        .log-indicator.error { background: var(--red); }
        .log-indicator.info { background: var(--text-dim); }

        .log-text {
            color: var(--text);
            word-break: break-all;
            flex: 1;
        }

        .log-text.success { color: var(--green); }
        .log-text.error { color: var(--red); }
        .log-text.info { color: var(--text-secondary); }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .empty-state-hint {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Footer ───────────────────────────────────────────── */

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.62rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-row">
                <div class="header-icon">⚡</div>
                <h1>Gemini Canvas Proxy</h1>
            </div>
            <p>Free unlimited Gemini API via Canvas postMessage bridge</p>
        </div>

        <div id="status-bar" class="status-bar waiting">
            <div id="status-dot" class="status-dot waiting"></div>
            <span id="status-label" class="status-label">Connecting...</span>
            <span id="status-badge" class="status-badge inactive">WAITING</span>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div id="stat-total" class="stat-value default">0</div>
                <div class="stat-label">Requests</div>
            </div>
            <div class="stat-card">
                <div id="stat-success" class="stat-value success">0</div>
                <div class="stat-label">Success</div>
            </div>
            <div class="stat-card">
                <div id="stat-errors" class="stat-value error">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>

        <div class="log-card">
            <div class="log-header">
                <span class="log-header-title">Activity Log</span>
                <span id="log-header-count" class="log-header-count">0 entries</span>
            </div>
            <div id="log-container" class="log-container">
                <div id="empty-state" class="empty-state">
                    <div class="empty-state-icon">📡</div>
                    <div class="empty-state-text">Waiting for requests</div>
                    <div class="empty-state-hint">curl http://127.0.0.1:8765/v1/chat/completions</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://github.com/ShadowPlague21/gemini-canvas-proxy" target="_blank">gemini-canvas-proxy</a> · postMessage bridge · no WebSocket · no LNA issues
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // CANVAS AUTO-INJECT — Canvas replaces the empty string with
        // the real API key at compile time. DO NOT modify this line.
        // ═══════════════════════════════════════════════════════════════
        const apiKey = "";

        var statusState = 'waiting';
        var stats = { total: 0, success: 0, errors: 0 };
        var logsCount = 0;
        var seenRequests = {};

        // Clean up seen requests every 30 seconds
        setInterval(function() {
            var now = Date.now();
            Object.keys(seenRequests).forEach(function(key) {
                if (now - seenRequests[key] > 30000) {
                    delete seenRequests[key];
                }
            });
        }, 30000);

        function updateStatus(newStatus) {
            var bar = document.getElementById('status-bar');
            var dot = document.getElementById('status-dot');
            var label = document.getElementById('status-label');
            var badge = document.getElementById('status-badge');
            
            statusState = newStatus;
            bar.className = 'status-bar ' + newStatus;
            dot.className = 'status-dot ' + newStatus;
            
            if (newStatus === 'waiting') {
                label.innerText = 'Connecting...';
                badge.innerText = 'WAITING';
                badge.className = 'status-badge inactive';
            } else if (newStatus === 'online') {
                label.innerText = 'Proxy Active';
                badge.innerText = 'LIVE';
                badge.className = 'status-badge active';
            } else {
                label.innerText = 'Disconnected';
                badge.innerText = 'OFFLINE';
                badge.className = 'status-badge inactive';
            }
        }

        function addLog(indicator, text, type) {
            type = type || 'info';
            var container = document.getElementById('log-container');
            var emptyState = document.getElementById('empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            var time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            var logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-indicator ${indicator}"></span>
                <span class="log-text ${type}">${text}</span>
            `;
            container.appendChild(logEntry);
            logsCount++;
            document.getElementById('log-header-count').innerText = logsCount + ' entries';
            
            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
            
            // Stats handling
            if (type === 'success') {
                stats.total++;
                stats.success++;
            } else if (type === 'error') {
                stats.total++;
                stats.errors++;
            }
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-success').innerText = stats.success;
            document.getElementById('stat-errors').innerText = stats.errors;
        }

        // Ready trigger
        setTimeout(function() {
            window.parent.postMessage({ source: 'gemini-proxy-ready' }, '*');
            updateStatus('online');
            addLog('info', 'Proxy ready — waiting for requests', 'info');
        }, 500);

        window.addEventListener('message', function(event) {
            var data = event.data;
            if (!data || data.source !== 'gemini-proxy-request') return;

            var id = data.id;
            if (seenRequests[id]) return;
            seenRequests[id] = Date.now();

            var method = data.method || 'POST';
            var path = data.path;
            var body = data.body;
            var headers = data.headers;
            
            addLog('request', method + ' ' + path.replace('/v1beta/models/', '').replace(':generateContent', ''));

            var url = 'https://generativelanguage.googleapis.com' + path;
            if (apiKey) {
                url += (url.indexOf('?') >= 0 ? '&' : '?') + 'key=' + encodeURIComponent(apiKey);
            }

            fetch(url, {
                method: method,
                headers: Object.assign({ 'Content-Type': 'application/json' }, headers || {}),
                body: body ? JSON.stringify(body) : undefined
            }).then(function(response) {
                addLog(response.ok ? 'success' : 'error',
                    response.status + ' ' + (response.ok ? 'OK' : (response.statusText || 'Error')),
                    response.ok ? 'success' : 'error');
                return response.json().catch(function() { return {}; }).then(function(respData) {
                    window.parent.postMessage({
                        source: 'gemini-proxy-response',
                        id: id,
                        status: response.status,
                        data: respData,
                        error: response.ok ? null : 'API ' + response.status
                    }, '*');
                });
            }).catch(function(err) {
                addLog('error', err.message, 'error');
                window.parent.postMessage({ source: 'gemini-proxy-response', id: id, error: err.message }, '*');
            });
        });
    </script>
</body>
</html>
